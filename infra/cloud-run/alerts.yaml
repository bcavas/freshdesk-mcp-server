alerts:
  - displayName: "MCP Server High Startup Latency"
    combiner: "OR"
    conditions:
      - conditionThreshold:
          filter: >-
            metric.type="run.googleapis.com/container/startup_latencies"
            resource.type="cloud_run_revision"
            resource.label."service_name"="freshdesk-mcp-server"
          comparison: "COMPARISON_GT"
          duration: "60s"
          thresholdValue: 10000
          trigger:
            count: 1
          aggregations:
            - alignmentPeriod: "60s"
              crossSeriesReducer: "REDUCE_PERCENTILE_99"
              perSeriesAligner: "ALIGN_DELTA"
    documentation:
      content: "Cold starts for the MCP Server are exceeding 10 seconds. Check container size or dependencies."
      mimeType: "text/markdown"
