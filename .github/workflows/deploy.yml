name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      promote_to_prod:
        description: 'Promote current staging image to production?'
        type: boolean
        required: true
        default: false

env:
  PROJECT_ID: freshdesk-mcp-server
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/freshdesk-mcp-server/freshdesk-mcp-server

jobs:
  # ── Staging deploy (runs on every merge to main) ──────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${{ env.REGISTRY }}/app:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to staging
        run: |
          # Substitute the image tag in service-staging.yaml and deploy
          sed -i "s|image: .*freshdesk-mcp-server/app:.*|image: ${{ env.IMAGE }}|" \
            infra/cloud-run/service-staging.yaml
          gcloud run services replace infra/cloud-run/service-staging.yaml \
            --region=${{ env.REGION }}

      - name: Verify staging health
        run: |
          STAGING_URL=$(gcloud run services describe freshdesk-mcp-server-staging \
            --region=${{ env.REGION }} \
            --format="value(status.url)")
          echo "Staging URL: $STAGING_URL"
          # Retry up to 5 times to allow for cold start
          for i in {1..5}; do
            curl -sf "$STAGING_URL/health" && break || sleep 5
          done
          curl -f "$STAGING_URL/health"
          echo "STAGING_URL=$STAGING_URL" >> $GITHUB_ENV

      - name: Print staging MCP endpoint
        run: |
          echo "✅ Staging deployed: ${{ env.STAGING_URL }}/mcp"
          echo "   Test with: npx @modelcontextprotocol/inspector ${{ env.STAGING_URL }}/mcp"

  # ── Production deploy (manual trigger only, requires approval) ────
  promote-to-prod:
    name: Promote to Production
    runs-on: ubuntu-latest
    if: github.event.inputs.promote_to_prod == 'true'
    environment: production  # Requires manual approval — configure in GitHub Settings

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get current staging image
        run: |
          IMAGE=$(gcloud run services describe freshdesk-mcp-server-staging \
            --region=${{ env.REGION }} \
            --format="value(spec.template.spec.containers[0].image)")
          echo "Promoting image from staging: $IMAGE"
          echo "STAGING_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to production
        run: |
          sed -i "s|image: .*freshdesk-mcp-server/app:.*|image: ${{ env.STAGING_IMAGE }}|" \
            infra/cloud-run/service-prod.yaml
          gcloud run services replace infra/cloud-run/service-prod.yaml \
            --region=${{ env.REGION }}

      - name: Verify production health
        run: |
          PROD_URL=$(gcloud run services describe freshdesk-mcp-server-prod \
            --region=${{ env.REGION }} \
            --format="value(status.url)")
          echo "Production URL: $PROD_URL"
          for i in {1..5}; do
            curl -sf "$PROD_URL/health" && break || sleep 5
          done
          curl -f "$PROD_URL/health"
          echo "✅ Production deployed: $PROD_URL/mcp"
