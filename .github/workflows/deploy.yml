name: Deploy to Cloud Run

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write   # Required for Workload Identity Federation

env:
  REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  SERVICE: freshdesk-mcp-server
  IMAGE_BASE: ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/freshdesk-mcp-server/server

jobs:
  deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run full CI checks
        run: |
          npm run lint
          npm run typecheck
          npm run test:coverage
          npm run build

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set image tag
        id: image
        run: |
          IMAGE_TAG="${{ env.IMAGE_BASE }}:${{ github.sha }}"
          IMAGE_LATEST="${{ env.IMAGE_BASE }}:latest"
          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "latest=${IMAGE_LATEST}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          docker build \
            --tag "${{ steps.image.outputs.tag }}" \
            --tag "${{ steps.image.outputs.latest }}" \
            --cache-from "${{ steps.image.outputs.latest }}" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .
          docker push "${{ steps.image.outputs.tag }}"
          docker push "${{ steps.image.outputs.latest }}"

      - name: Prepare service manifest
        run: |
          sed -i \
            -e "s|IMAGE_URL_PLACEHOLDER|${{ steps.image.outputs.tag }}|g" \
            -e "s|PROJECT_ID|${{ secrets.GCP_PROJECT_ID }}|g" \
            infra/cloud-run/service.yaml

      - name: Deploy to Cloud Run
        run: |
          gcloud run services replace infra/cloud-run/service.yaml \
            --region="${{ env.REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}"

      - name: Allow unauthenticated invocations
        run: |
          gcloud run services add-iam-policy-binding ${{ env.SERVICE }} \
            --region="${{ env.REGION }}" \
            --member="allUsers" \
            --role="roles/run.invoker" \
            --project="${{ secrets.GCP_PROJECT_ID }}"

      - name: Get service URL and verify readiness
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region="${{ env.REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --format="value(status.url)")
          echo "SERVICE_URL=${SERVICE_URL}" >> "$GITHUB_ENV"
          echo "### Deployed to ${SERVICE_URL}" >> "$GITHUB_STEP_SUMMARY"

          # Poll the Cloud Run Ready condition instead of curling the service URL directly.
          # The service uses internal-and-cloud-load-balancing ingress (no public access),
          # so direct HTTP health checks from GitHub Actions runners are blocked.
          # The Cloud Run startup probe already validates /health before setting Ready=True,
          # making this an equivalent gate that works entirely through the authenticated gcloud API.
          echo "==> Polling Cloud Run service readiness..."
          for i in {1..12}; do
            READY=$(gcloud run services describe ${{ env.SERVICE }} \
              --region="${{ env.REGION }}" \
              --project="${{ secrets.GCP_PROJECT_ID }}" \
              --format=json \
              | jq -r '.status.conditions[] | select(.type=="Ready") | .status // "Unknown"')
            if [ "${READY}" = "True" ]; then
              echo "    Service is Ready (attempt ${i})"
              echo "**Health:** ✅ Service Ready — ${SERVICE_URL}" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "    Readiness check attempt ${i}: status=${READY:-Unknown}, retrying in 10s..."
            sleep 10
          done
          echo "    Service did not become Ready after 12 attempts (2 minutes)."
          echo "    Full status conditions:"
          gcloud run services describe ${{ env.SERVICE }} \
            --region="${{ env.REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --format=json | jq '.status.conditions' || true
          exit 1

