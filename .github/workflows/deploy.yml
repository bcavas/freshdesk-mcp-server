name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      promote_to_prod:
        description: 'Promote current staging image to production?'
        type: boolean
        required: true
        default: false

jobs:
  # ── Staging deploy (runs on every merge to main) ──────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    # PROJECT_ID and REGISTRY reference secrets — cannot be set at workflow level.
    # GCP_PROJECT_ID must be added as a GitHub Actions secret (Settings → Secrets → Actions).
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: us-central1

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          REGISTRY="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/freshdesk-mcp-server"
          IMAGE="$REGISTRY/app:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to staging
        run: |
          # Substitute placeholders in the service manifest with real values
          sed -i "s|YOUR_PROJECT_ID|${{ env.PROJECT_ID }}|g" infra/cloud-run/service-staging.yaml
          sed -i "s|image: .*freshdesk-mcp-server/app:.*|image: $IMAGE|" \
            infra/cloud-run/service-staging.yaml
          gcloud run services replace infra/cloud-run/service-staging.yaml \
            --region=${{ env.REGION }}

          # Allow unauthenticated invocations (required for MCP clients without GCP auth).
          # Cloud Run requires authentication by default — this binding must be set explicitly.
          gcloud run services add-iam-policy-binding freshdesk-mcp-server-staging \
            --region=${{ env.REGION }} \
            --member="allUsers" \
            --role="roles/run.invoker"

          # IAM policy changes propagate asynchronously in Cloud Run's data plane.
          # Without this wait the health check below races against propagation and gets 403.
          echo "Waiting 30s for IAM policy to propagate..."
          sleep 30

      - name: Verify staging health
        run: |
          STAGING_URL=$(gcloud run services describe freshdesk-mcp-server-staging \
            --region=${{ env.REGION }} \
            --format="value(status.url)")
          echo "Staging URL: $STAGING_URL"
          # Retry up to 12 times (60s) to handle cold start + residual IAM propagation delay
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/health")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed on attempt $i (HTTP 200)"
              break
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 5s..."
            sleep 5
          done
          curl -f "$STAGING_URL/health"
          echo "STAGING_URL=$STAGING_URL" >> $GITHUB_ENV

      - name: Print staging MCP endpoint
        run: |
          echo "✅ Staging deployed: $STAGING_URL/mcp"
          echo "   Test with: npx @modelcontextprotocol/inspector $STAGING_URL/mcp"

  # ── Production deploy (manual trigger only, requires approval) ────
  promote-to-prod:
    name: Promote to Production
    runs-on: ubuntu-latest
    if: github.event.inputs.promote_to_prod == 'true'
    environment: production  # Requires manual approval — configure in GitHub Settings

    # GCP_PROJECT_ID must be added as a GitHub Actions secret (Settings → Secrets → Actions).
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: us-central1

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get current staging image
        run: |
          IMAGE=$(gcloud run services describe freshdesk-mcp-server-staging \
            --region=${{ env.REGION }} \
            --format="value(spec.template.spec.containers[0].image)")
          echo "Promoting image from staging: $IMAGE"
          echo "STAGING_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to production
        run: |
          # Substitute placeholders in the service manifest with real values
          sed -i "s|YOUR_PROJECT_ID|${{ env.PROJECT_ID }}|g" infra/cloud-run/service-prod.yaml
          sed -i "s|image: .*freshdesk-mcp-server/app:.*|image: $STAGING_IMAGE|" \
            infra/cloud-run/service-prod.yaml
          gcloud run services replace infra/cloud-run/service-prod.yaml \
            --region=${{ env.REGION }}

          # Allow unauthenticated invocations (required for MCP clients without GCP auth).
          # Cloud Run requires authentication by default — this binding must be set explicitly.
          gcloud run services add-iam-policy-binding freshdesk-mcp-server-prod \
            --region=${{ env.REGION }} \
            --member="allUsers" \
            --role="roles/run.invoker"

          # IAM policy changes propagate asynchronously — wait before health check.
          echo "Waiting 30s for IAM policy to propagate..."
          sleep 30

      - name: Verify production health
        run: |
          PROD_URL=$(gcloud run services describe freshdesk-mcp-server-prod \
            --region=${{ env.REGION }} \
            --format="value(status.url)")
          echo "Production URL: $PROD_URL"
          # Retry up to 12 times (60s) to handle cold start + residual IAM propagation delay
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL/health")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed on attempt $i (HTTP 200)"
              break
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 5s..."
            sleep 5
          done
          curl -f "$PROD_URL/health"
          echo "✅ Production deployed: $PROD_URL/mcp"
